<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8866"/>
      <stop offset="100%" style="stop-color:#FF5533"/>
    </linearGradient>
  </defs>
  
  <!-- 虾身 - 流畅的弧线 -->
  <path d="M25 50 Q20 38 30 32 Q45 22 60 28 Q75 35 72 50 Q70 65 55 72 Q40 78 30 70 Q18 60 25 50" 
        fill="url(#body)"/>
  
  <!-- 虾头 -->
  <circle cx="32" cy="40" r="9" fill="url(#body)"/>
  
  <!-- 眼睛 - 黑点和高光 -->
  <circle cx="29" cy="37" r="2.5" fill="#333"/>
  <circle cx="30" cy="36" r="1" fill="white"/>
  <circle cx="35" cy="37" r="2.5" fill="#333"/>
  <circle cx="36" cy="36" r="1" fill="white"/>
  
  <!-- 虾尾 - 优雅的弧度 -->
  <path d="M68 48 Q82 42 78 58 Q74 70 62 68" fill="url(#body)"/>
  <path d="M62 50 Q72 46 70 58 Q68 66 58 64" fill="url(#body)" opacity="0.8"/>
  
  <!-- 触角 - 优雅弯曲 -->
  <path d="M28 32 Q15 18 22 8" stroke="url(#body)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M36 32 Q42 15 38 5" stroke="url(#body)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <!-- 虾腿 -->
  <path d="M40 55 Q35 62 38 68" stroke="url(#body)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M50 60 Q48 68 52 74" stroke="url(#body)" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M60 58 Q62 65 60 72" stroke="url(#body)" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
